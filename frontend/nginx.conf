server {
    listen 80;
    server_name localhost;

    # Dossier racine du build React
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression gzip ─────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── Proxy API → Backend FastAPI ───────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout pour les prédictions ML
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy Swagger UI ─────────────────────────
    location /swagger {
        proxy_pass http://backend:8000/swagger;
        proxy_set_header Host $host;
    }

    # ── Proxy Docs custom ────────────────────────
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    # ── Fichiers statiques React (cache agressif) ─
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── React Router (SPA fallback) ───────────────
    # Toutes les routes inconnues → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Sécurité : cacher les infos serveur ───────
    server_tokens off;

    # ── Logs ──────────────────────────────────────
    access_log /var/log/nginx/nursery_access.log;
    error_log  /var/log/nginx/nursery_error.log warn;
}